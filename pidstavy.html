<style>

    color: var(--text-secondary);

  }

    width: 100%;
    height: 40px;
    padding-left: 32px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    font-size: 16px;
    font-family: inherit;
    background: var(--surface-2);
    color: var(--text-primary);

const dotColor = {"Переговорна процедура":"#18063a","Пряма закупівля":"#e45066","Спрощена закупівля":"#fcad10"};

function norm(s){
  return s.toLowerCase().replace(/['’`ʼ]/g, "'").replace(/\s+/g," ").trim();
}

let activeGrp = "all";
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');

function render(){
  const q = norm(searchEl.value);
  const filtered = DATA.filter(d => (activeGrp==="all" || d.g===activeGrp) && (q==="" || norm(d.t).includes(q) || norm(d.full).includes(q) || norm(d.num).includes(q)));
  listEl.innerHTML = "";
  filtered.forEach((d) => {
    const card = document.createElement('div');
    card.style.cssText = "border:0.5px solid var(--border); border-radius:12px; background:var(--surface-2); overflow:hidden;";
    const head = document.createElement('button');
    head.className = "card-head";
    head.setAttribute('aria-expanded','false');
    head.innerHTML = `
      <span style="width:8px; height:8px; border-radius:50%; background:${dotColor[d.g]}; flex-shrink:0; margin-top:6px;"></span>
      <span style="flex:1;">
        <span style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:2px;">${d.num}</span>
        <span style="display:block; font-size:14px; font-weight:500; color:var(--text-primary);">${d.t}</span>
      </span>
      <i class="ti ti-chevron-down chev" aria-hidden="true" style="font-size:16px; color:var(--text-muted); transition:transform 0.15s; flex-shrink:0; margin-top:4px;"></i>
    `;
    const body = document.createElement('div');
    body.style.cssText = "max-height:0; overflow:hidden; transition:max-height 0.25s ease;";
    const noteHtml = d.note ? `<div style="margin-top:10px; padding-top:10px; border-top:0.5px dashed var(--border);"><span style="font-size:11px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.02em;">Особливості закупівлі</span><div style="font-size:13px; line-height:1.6; color:var(--text-secondary); margin-top:4px;">${d.note}</div></div>` : "";
    body.innerHTML = `<div style="padding:0 1rem 1rem; font-size:13px; line-height:1.6; color:var(--text-secondary); border-top:0.5px solid var(--border); padding-top:10px;">${d.full}${noteHtml}</div>`;
    let open = false;
    head.addEventListener('click', () => {
      open = !open;
      head.setAttribute('aria-expanded', String(open));
      body.style.maxHeight = open ? body.scrollHeight + 60 + "px" : "0";
      head.querySelector('.chev').style.transform = open ? "rotate(180deg)" : "rotate(0deg)";
    });
    card.appendChild(head);
    card.appendChild(body);
    listEl.appendChild(card);
  });
}

function setActiveButton(btn){
  document.querySelectorAll('.grp-btn').forEach(b => {
    const isActive = b===btn;
    b.style.background = isActive ? "var(--text-primary)" : "var(--surface-2)";
    b.style.color = isActive ? "var(--surface-2)" : "var(--text-secondary)";
    b.style.borderColor = isActive ? "var(--text-primary)" : "var(--border)";
    b.style.fontWeight = isActive ? "600" : "400";
  });
}

document.querySelectorAll('.grp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeGrp = btn.dataset.grp;
    setActiveButton(btn);
    render();
  });
});
setActiveButton(document.querySelector('.grp-btn[data-grp="all"]'));
searchEl.addEventListener('input', render);
render();

// Auto-resize: notify parent page of content height so an embedding iframe
// can be sized dynamically instead of using a fixed height.
function postHeight(){
  const height = document.body.scrollHeight;
  window.parent.postMessage({ type: "pidstavy1178-resize", height: height }, "*");
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);
if (window.ResizeObserver) {
  new ResizeObserver(postHeight).observe(document.querySelector('.wrap'));
} else {
  // fallback for older browsers without ResizeObserver
  setInterval(postHeight, 500);
}
postHeight();
</script>
