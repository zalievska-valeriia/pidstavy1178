<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Як тепер купувати те, що раніше було винятками за п 13 Особливостей?</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --surface-2: #ffffff;
    --surface-1: #f4f3ef;
    --surface-0: #ececE5;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.22);
    --radius: 8px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    font-family: var(--font-sans);
    background: var(--surface-0);
    color: var(--text-primary);
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    background: var(--surface-2);
    border-radius: 16px;
    padding: 24px;
    border: 0.5px solid var(--border);
  }
  h2 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 1rem;
  }
  .grp-btn {
    font-size: 13px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-secondary);
    font-family: inherit;
  }
  .grp-btn:hover { background: var(--surface-1); }
  #search {
    width: 100%;
    height: 36px;
    padding-left: 32px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    font-size: 14px;
    font-family: inherit;
    background: var(--surface-2);
    color: var(--text-primary);
  }
  #search:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }
  .card-head {
    width: 100%;
    text-align: left;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<div class="wrap">
<h2>Винятки з Особливостей після останніх змін в 1178</h2>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
  <button class="grp-btn" data-grp="all">Усі</button>
  <button class="grp-btn" data-grp="Прямий договір"><span style="width:8px;height:8px;border-radius:50%;background:#e45066;flex-shrink:0;"></span>Прямий договір</button>
  <button class="grp-btn" data-grp="Відкриті торги"><span style="width:8px;height:8px;border-radius:50%;background:#2a055b;flex-shrink:0;"></span>Відкриті торги</button>
  <button class="grp-btn" data-grp="Переговорна процедура"><span style="width:8px;height:8px;border-radius:50%;background:#2db226;flex-shrink:0;"></span>Переговорна процедура</button>
  <button class="grp-btn" data-grp="Спрощена закупівля"><span style="width:8px;height:8px;border-radius:50%;background:#fcad10;flex-shrink:0;"></span>Спрощена закупівля</button>
</div>

<div style="position:relative; margin-bottom:16px;">
  <i class="ti ti-search" aria-hidden="true" style="position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--text-muted);"></i>
  <input id="search" type="text" placeholder="Пошук за назвою або текстом норми" />
</div>

<div id="list" style="display:flex; flex-direction:column; gap:8px;"></div>

<p style="font-size:12px; color:var(--text-muted); margin:1.25rem 0 0; padding-top:0.75rem; border-top:0.5px solid var(--border);">Решта підстав з попередньої редакції постанови відсутні у новій.</p>
</div>

<script>
const DATA = [
{t:"Задоволення нагальних потреб функціонування держави (постанова №185)", g:"Прямий договір", def:false, full:"Публічні закупівлі товарів, робіт і послуг для задоволення нагальних потреб функціонування держави в умовах воєнного стану відповідно до абзаців третього і четвертого підпункту 1 пункту 1 постанови Кабінету Міністрів України від 2 березня 2022 р. № 185 здійснюються замовниками без застосування процедур закупівель/спрощених закупівель, визначених Законом та цими особливостями."},
{t:"Пошук осіб, зниклих безвісти за особливих обставин", g:"Відкриті торги", def:false, full:"Публічні закупівлі для здійснення заходів щодо пошуку осіб, зниклих безвісти за особливих обставин, та репатріації і повернення зниклих безвісти (військових, цивільних), що проводяться Мінреінтеграції та державними підприємствами, що належать до сфери його управління, здійснюються без застосування процедур закупівель/спрощених закупівель, визначених Законом та цими особливостями."},
{t:"Закупівлі ДУС під час війни та палива для УДО", g:"Прямий договір", def:false, full:"Публічні закупівлі товарів, робіт і послуг для забезпечення виконання завдань, покладених на Державне управління справами, в умовах правового режиму воєнного стану за рахунок коштів резервного фонду Державного бюджету України розпорядниками (одержувачами) бюджетних коштів, а також закупівлі бензину та дизельного пального Управлінням державної охорони України здійснюються без застосування процедур закупівель/спрощених закупівель, визначених Законом та цими особливостями."},
{t:"Закупівлі для морських портів у державних господарських товариств", g:"Відкриті торги", def:false, full:"Закупівля у господарського товариства, 100 відсотків акцій якого належить іншому господарському товариству, 100 відсотків акцій якого належать державі, послуг із забезпечення безперебійного функціонування, своєчасного обслуговування комплексу будівель, споруд, обладнання та устаткування державної власності, призначених для забезпечення прийняття та відвантаження нафти, нафтопродуктів з/на морський транспорт, здійснюється до 31 грудня 2025 р. без застосування процедур закупівель/спрощених закупівель, державним підприємством, яке перебуває у сфері управління Міненерго."},
{t:"Закупівлі для центрів єдності", g:"Відкриті торги", def:false, full:"Придбання для центрів єдності, які діють відповідно до Порядку реалізації експериментального проекту щодо розбудови мережі єдності українців за кордоном, товарів, робіт і послуг виключно для забезпечення їх діяльності (транспорт, оренда, комунальні послуги, ремонт, охорона, зв'язок, обладнання, ПЗ, консультаційні, рекламні та інші послуги) здійснюється без застосування процедур закупівель/спрощених закупівель, визначених Законом та цими особливостями."},
{t:"Закупівлі для експериментального підрозділу NEXT", g:"Прямий договір", def:false, full:"Публічні закупівлі товарів, робіт і послуг, необхідних для забезпечення експериментального підрозділу NEXT відповідно до Порядку випробувань та досліджень спеціальних інноваційних технологій Фондом розвитку інновацій у період дії правового режиму воєнного стану, здійснюються Фондом розвитку інновацій без застосування процедур закупівель/спрощених закупівель, визначених Законом та цими особливостями."},
{t:"Замовник перебуває на території бойових дій", g:"Переговорна процедура", def:true, full:"Замовник або його відокремлений підрозділ, що здійснює закупівлю згідно з абзацом другим пункту 15 цих особливостей, перебуває на території активних бойових дій, які не були завершені на дату укладення договору про закупівлю."},
{t:"Нагальна потреба", g:"Переговорна процедура", def:true, full:"Існує нагальна потреба у здійсненні закупівлі у зв'язку з виникненням об'єктивних обставин, що унеможливлюють дотримання замовником строків для проведення закупівлі із застосуванням відкритих торгів та/або електронного каталогу, яка повинна бути документально підтверджена замовником."},
{t:"Роботи, товари чи послуги можуть бути виконані, поставлені чи надані виключно певним суб'єктом господарювання", g:"Переговорна процедура", def:true, full:"Роботи, товари чи послуги можуть бути виконані, поставлені чи надані виключно певним суб'єктом господарювання в одному з таких випадків: предмет закупівлі полягає у створенні або придбанні витвору мистецтва або художнього виконання; укладення договору з переможцем архітектурного або мистецького конкурсу; відсутність конкуренції з технічних причин, документально підтверджена замовником; необхідність захисту прав інтелектуальної власності; укладення договору з постачальником «останньої надії» або постачальником універсальної послуги на електроенергію чи природний газ."},
{t:"Після невдалих відкритих торгів", g:"Переговорна процедура", def:true, full:"Відмінено відкриті торги через неподання жодної тендерної пропозиції у строк, установлений замовником, у тому числі за лотом. Предмет закупівлі, технічні, кількісні та якісні характеристики, проект договору та вимоги до суб'єкта не повинні відрізнятися від визначених у тендерній документації, а сума договору без ПДВ не може перевищувати очікувану вартість, зазначену в оголошенні про відкриті торги, які відмінено через відсутність достатньої кількості учасників, з урахуванням прийнятного відсотка перевищення ціни, якщо він був зазначений у тендерній документації."},
{t:"Додатковий обсяг товару до 50%", g:"Переговорна процедура", def:true, full:"Після укладення договору про закупівлю у замовника виникла необхідність у постачанні додаткового обсягу товару тим самим постачальником, якщо в разі зміни постачальника замовник буде вимушений придбати товар з іншими технічними характеристиками, що призведе до несумісності, пов'язаної з експлуатацією і технічним обслуговуванням, або якщо закупівля зумовлена змінами до галузевих стандартів у сфері охорони здоров'я. Здійснюється протягом трьох років після укладення договору, якщо загальна вартість не перевищує 50 відсотків ціни договору."},
{t:"Додатковий обсяг послуг або робіт до 50%", g:"Переговорна процедура", def:true, full:"У замовника після укладення договору про закупівлю виникла необхідність у закупівлі додаткових робіт чи послуг, пов'язаних з предметом закупівлі основного договору, в того самого виконавця робіт/надавача послуг. Можливість і умови таких додаткових робіт чи послуг можуть бути передбачені в основному договорі. Здійснюється протягом трьох років після укладення договору, якщо загальна вартість не перевищує 50 відсотків ціни основного договору."},
{t:"Закупівля адвокатських послуг", g:"Відкриті торги", def:true, full:"Здійснюється закупівля послуг з адвокатської діяльності."},
{t:"Закупівля юридичних послуг для представлення в закордонних судах", g:"Переговорна процедура", def:false, full:"Здійснюється закупівля юридичних послуг, пов'язаних із захистом прав та інтересів України, у тому числі з метою захисту національної безпеки і оборони, під час врегулювання спорів, розгляду в закордонних юрисдикційних органах справ за участю іноземного суб'єкта та України."},
{t:"Закупівлі для спортивних заходів", g:"Відкриті торги", def:false, full:"Здійснюється закупівля послуг, необхідних для проведення спортивних заходів, спортивних змагань, заходів з фізичної культури і спорту, фізкультурно-спортивної реабілітації, що включені до Єдиного календарного плану фізкультурно-оздоровчих, спортивних заходів та спортивних змагань України на відповідний рік."},
{t:"Закупівлі для захисту об'єктів критичної інфраструктури, зокрема паливно-енергетичного сектору", g:"Прямий договір", def:false, full:"Здійснюється закупівля товарів, робіт та послуг для будівництва, ремонту та інших інженерно-технічних заходів із захисту об'єктів критичної інфраструктури паливно-енергетичного сектору та сектору систем життєзабезпечення критичної інфраструктури в рамках експериментального проекту відповідно до постанови КМУ від 7 лютого 2025 р. № 142, за договорами, які укладаються до 15 жовтня 2026 року."},
{t:"Закупівля у постачальника останньої надії чи універсальної послуги", g:"Переговорна процедура", def:false, full:"Здійснюється закупівля природного газу суб'єктом ринку природного газу, на якого Кабінетом Міністрів України відповідно до Закону України «Про ринок природного газу» покладено спеціальні обов'язки для забезпечення загальносуспільних інтересів у процесі функціонування ринку природного газу."},
{t:"Закупівлі для збройних сил на їхній запит", g:"Переговорна процедура", def:false, full:"Здійснюється закупівля товарів, робіт та послуг, необхідних для будівництва військових інженерно-технічних і фортифікаційних споруд, виконання мобілізаційних завдань, заходів територіальної оборони, договорів з інформацією з обмеженим доступом, якщо закупівля здійснюється для нагальних потреб Збройних Сил, інших військових формувань, правоохоронних органів, ДСНС, вищих військових навчальних закладів на їх запит з подальшою передачею товарів, робіт та послуг на облік запитувача."},
{t:"Закупівлі в межах заходів Комплексного плану стійкості регіонів та окремих міст до 31.12.26", g:"Прямий договір", def:false, full:"Здійснюється до 31 грудня 2026 р. закупівля енергетичного обладнання (турбіни, генератори, котельні, теплові насоси, трансформатори тощо), необхідного для подолання наслідків або запобігання виникненню надзвичайної ситуації державного (регіонального) рівня, а також робіт та послуг з їх будівництва, відновлення, реконструкції, розміщення, капітального ремонту та захисту, в рамках Комплексних планів стійкості регіонів та окремих міст, схвалених РНБО від 3 березня 2026 р."},
{t:"Закупівлі для реалізації експериментального проєкту з будівництва та розміщення систем незалежного живлення в багатоповерхівках Києва", g:"Спрощена закупівля", def:false, full:"Публічні закупівлі товарів, робіт і послуг відповідно до Порядку реалізації експериментального проекту щодо будівництва та/або розміщення систем незалежного резервного живлення в багатоквартирних будинках м. Києва, затвердженого постановою КМУ від 20 березня 2026 р. № 353, здійснюються незалежно від їх вартості шляхом застосування спрощених закупівель."}
];

const dotColor = {"Прямий договір":"#e45066","Відкриті торги":"#2a055b","Переговорна процедура":"#2db226","Спрощена закупівля":"#fcad10"};

function norm(s){
  return s.toLowerCase().replace(/['’`ʼ]/g, "'").replace(/\s+/g," ").trim();
}

let activeGrp = "all";
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');

function render(){
  const q = norm(searchEl.value);
  const filtered = DATA.filter(d => (activeGrp==="all" || d.g===activeGrp) && (q==="" || norm(d.t).includes(q) || norm(d.full).includes(q)));
  listEl.innerHTML = "";
  filtered.forEach((d) => {
    const card = document.createElement('div');
    card.style.cssText = "border:0.5px solid var(--border); border-radius:12px; background:var(--surface-2); overflow:hidden;";
    const head = document.createElement('button');
    head.className = "card-head";
    head.setAttribute('aria-expanded','false');
    head.innerHTML = `
      <span style="width:8px; height:8px; border-radius:50%; background:${dotColor[d.g]}; flex-shrink:0;"></span>
      <span style="flex:1; font-size:14px; font-weight:500; color:var(--text-primary);">${d.t}</span>
      ${d.def ? `<span title="Оборонці можна укладати договір напряму" style="font-size:11px; padding:2px 8px; border-radius:8px; background:#8a8c52; color:#f5f5e6; flex-shrink:0; white-space:nowrap;">+ в оборонці</span>` : ""}
      <i class="ti ti-chevron-down chev" aria-hidden="true" style="font-size:16px; color:var(--text-muted); transition:transform 0.15s; flex-shrink:0;"></i>
    `;
    const body = document.createElement('div');
    body.style.cssText = "max-height:0; overflow:hidden; transition:max-height 0.2s ease;";
    body.innerHTML = `<div style="padding:0 1rem 1rem; font-size:13px; line-height:1.6; color:var(--text-secondary); border-top:0.5px solid var(--border); padding-top:10px;">${d.full}</div>`;
    let open = false;
    head.addEventListener('click', () => {
      open = !open;
      head.setAttribute('aria-expanded', String(open));
      body.style.maxHeight = open ? body.scrollHeight + 40 + "px" : "0";
      head.querySelector('.chev').style.transform = open ? "rotate(180deg)" : "rotate(0deg)";
    });
    card.appendChild(head);
    card.appendChild(body);
    listEl.appendChild(card);
  });
}

function setActiveButton(btn){
  document.querySelectorAll('.grp-btn').forEach(b => {
    const isActive = b===btn;
    b.style.background = isActive ? "var(--surface-1)" : "var(--surface-2)";
    b.style.borderColor = isActive ? "var(--border-strong)" : "var(--border)";
    b.style.fontWeight = isActive ? "500" : "400";
    b.style.color = isActive ? "var(--text-primary)" : "var(--text-secondary)";
  });
}

document.querySelectorAll('.grp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeGrp = btn.dataset.grp;
    setActiveButton(btn);
    render();
  });
});
setActiveButton(document.querySelector('.grp-btn[data-grp="all"]'));
searchEl.addEventListener('input', render);
render();
</script>

</body>
</html>
